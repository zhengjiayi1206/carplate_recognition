<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320">
  <defs>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#15803d"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #4b5563; }
      .label { font: 700 22px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #111827; }
      .caption { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #6b7280; }
      .msg { font: 600 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #111827; }
      .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #374151; }
      .tiny { font: 400 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #4b5563; }
      .boxTitle { font: 700 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #111827; }
      .boxText { font: 400 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
      .lifeline { stroke: #9ca3af; stroke-width: 3; stroke-dasharray: 9 9; }
      .actor { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 16; }
      .section { fill: #fafafa; stroke: #e5e7eb; stroke-width: 2; rx: 18; }
      .process { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.6; rx: 14; }
      .arrowIn { stroke: #1d4ed8; stroke-width: 3.2; fill: none; marker-end: url(#arrow-blue); }
      .arrowOut { stroke: #1f2937; stroke-width: 3.2; fill: none; marker-end: url(#arrow-dark); }
      .arrowAck { stroke: #15803d; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-green); }
      .divider { stroke: #e5e7eb; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1320"/>

  <text class="title" x="950" y="54" text-anchor="middle">车牌语音 Agent 流程图</text>
  <text class="subtitle" x="950" y="82" text-anchor="middle">每轮只输入一次音频；首轮和多轮分开看，对外只画 ACK 和最终返回</text>

  <rect class="actor" x="130" y="112" width="240" height="70"/>
  <text class="label" x="250" y="145" text-anchor="middle">用户侧</text>
  <text class="caption" x="250" y="168" text-anchor="middle">每轮只发一段音频</text>

  <rect class="actor" x="1530" y="112" width="240" height="70"/>
  <text class="label" x="1650" y="145" text-anchor="middle">AI Agent 侧</text>
  <text class="caption" x="1650" y="168" text-anchor="middle">内部处理后再返回</text>

  <line class="lifeline" x1="250" y1="190" x2="250" y2="1210"/>
  <line class="lifeline" x1="1650" y1="190" x2="1650" y2="1210"/>

  <rect class="section" x="90" y="200" width="1720" height="360"/>
  <text class="label" x="130" y="235">首轮识别</text>
  <text class="caption" x="130" y="258">当前没有暂存车牌</text>

  <path class="arrowIn" d="M 274 285 L 1628 285"/>
  <text class="msg" x="950" y="269" text-anchor="middle">首轮音频</text>

  <rect class="process" x="980" y="318" width="590" height="120" rx="14"/>
  <text class="boxTitle" x="1010" y="344">Agent 内部处理</text>
  <text class="boxText" x="1010" y="368">1. 判断音频里有没有车牌内容</text>
  <text class="boxText" x="1010" y="390">2. 提取并规范车牌</text>
  <text class="boxText" x="1010" y="412">3. 校验长度、判断车型、扫混淆点</text>

  <path class="arrowAck" d="M 1628 470 L 274 470"/>
  <text class="msg" x="950" y="454" text-anchor="middle">ACK：已听到车牌信息</text>
  <text class="tiny" x="950" y="492" text-anchor="middle">只在听到车牌时提前返回，不是新的用户输入</text>

  <path class="arrowOut" d="M 1628 535 L 274 535"/>
  <text class="msg" x="950" y="519" text-anchor="middle">最终返回：无车牌 / 号码无效 / 待确认</text>
  <text class="tiny" x="950" y="557" text-anchor="middle">同时保存当前车牌、车型、混淆点和 ACK 状态</text>

  <line class="divider" x1="90" y1="610" x2="1810" y2="610"/>

  <rect class="section" x="90" y="640" width="1720" height="360"/>
  <text class="label" x="130" y="675">多轮确认 / 纠错</text>
  <text class="caption" x="130" y="698">当前已有暂存车牌</text>

  <path class="arrowIn" d="M 274 725 L 1628 725"/>
  <text class="msg" x="950" y="709" text-anchor="middle">多轮音频</text>

  <rect class="process" x="980" y="758" width="590" height="120" rx="14"/>
  <text class="boxTitle" x="1010" y="784">Agent 内部处理</text>
  <text class="boxText" x="1010" y="808">1. 判断是否在确认上一轮结果</text>
  <text class="boxText" x="1010" y="830">2. 根据本轮音频更新当前车牌</text>
  <text class="boxText" x="1010" y="852">3. 重新规范、校验长度、处理混淆点</text>

  <path class="arrowAck" d="M 1628 910 L 274 910"/>
  <text class="msg" x="950" y="894" text-anchor="middle">ACK：当前信息有误，我重新处理</text>
  <text class="tiny" x="950" y="932" text-anchor="middle">只在需要更新时提前返回，不代表用户再次输入</text>

  <path class="arrowOut" d="M 1628 975 L 274 975"/>
  <text class="msg" x="950" y="959" text-anchor="middle">最终返回：已确认 / 更新后待确认 / 无效</text>
  <text class="tiny" x="950" y="997" text-anchor="middle">确认成功写入最终车牌，否则保存新暂存状态等待下一轮</text>

  <text class="caption" x="950" y="1078" text-anchor="middle">这张图只画对外消息和 Agent 内部核心步骤，不展开实现细节</text>
</svg>
